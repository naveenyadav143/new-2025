<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Year Surprise for My Love</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Happy New Year, My Love!</h1>
        <p>Your presence makes every moment special. Here's to more amazing memories together!</p>
        <div id="countdown">00d 00h 00m 00s</div>
        <div class="gallery">
            <img src="cpic.png" alt="Memory 1">
            <img src="pic.jpg" alt="Memory 2">
            <img src="cpic2.jpg" alt="Memory 3">
            <img src="pic2.jpg" alt="Memory 4">
        </div>
        <audio controls autoplay loop>
            <source src="romantic_song.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>
    <div class="hearts"></div>
    
    <!-- Overlay for New Year message and image -->
    <div id="overlay">
        <div id="overlay-message"></div>
        <img src="newyear_surprise.jpg" alt="Happy New Year Surprise!">
    </div>

    <script src="script.js"></script>
</body>
</html>
